name: Onamae.com RSS to Slack

on:
  schedule:
    # 15分おきに実行（UTC基準。頻度は好みに応じて変更可）
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # 手動実行もできるようにしておく

# stateファイルをコミットするため書き込み権限を付与
permissions:
  contents: write

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5

      - name: Pythonをセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: RSSをチェックしてSlackに通知
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/notify_slack.py

      - name: 既読状態(state)をコミット
        # 通知ステップが途中で失敗しても、成功済みの既読を確実に保存する
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen_ids.json
          # 変更がなければ何もしない
          if git diff --quiet --cached; then
            echo "state に変更なし。コミット/プッシュをスキップします。"
            exit 0
          fi
          git commit -m "Update seen article state [skip ci]"
          # 実行の競合でリモートが先に進んでいることがあるため、
          # rebase してからプッシュ。失敗したらリトライする。
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "プッシュ失敗 ($i回目)。リトライします..."
            sleep 5
          done
          echo "5回リトライしてもプッシュできませんでした。" >&2
          exit 1
